<script>
  // Captura o evento de instalação do PWA o quanto antes (precisa ser registrado
  // antes do Chrome disparar o evento, senão ele se perde). Guardamos numa variável
  // global simples para o React poder ler/usar depois, sem depender de timing.
  window.__deferredInstallPrompt = null;
  window.__pwaInstallListeners = [];
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    window.__deferredInstallPrompt = e;
    window.__pwaInstallListeners.forEach((cb) => cb(e));
  });
  window.addEventListener("appinstalled", () => {
    window.__deferredInstallPrompt = null;
    window.__pwaInstallListeners.forEach((cb) => cb(null));
  });

  const firebaseConfig = {
    apiKey: "AIzaSyD9c6LvsMW5ydeNrI3X7BdJQU1jicq_8CA",
    authDomain: "pronunciation-builder.firebaseapp.com",
    projectId: "pronunciation-builder",
    storageBucket: "pronunciation-builder.firebasestorage.app",
    messagingSenderId: "342600695252",
    appId: "1:342600695252:web:ea374d457ef324a029aa41"
  };
  firebase.initializeApp(firebaseConfig);
  const db   = firebase.firestore();
  db.settings({ experimentalAutoDetectLongPolling: true, merge: true });
  const auth = firebase.auth();
  console.log("🟣 [DEBUG] Versão do app carregada: LONGPOLLING-FIX-v1");

  async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
      await auth.signInWithPopup(provider);
    } catch(e) {
      if (e.code === 'auth/popup-blocked' || e.code === 'auth/operation-not-supported-in-this-environment' || e.code === 'auth/cancelled-popup-request') {
        try { await auth.signInWithRedirect(provider); }
        catch(e2) { alert("Não foi possível abrir o login do Google."); }
      } else if (e.code !== 'auth/popup-closed-by-user') {
        alert("Erro ao fazer login: " + e.message);
      }
    }
  }

  function signOut() { auth.signOut(); }

  let redirectResultPromise = auth.getRedirectResult()
    .catch(e => {
      console.error("Erro ao processar retorno do login (getRedirectResult):", e);
      return null;
    });

  async function logActivity(data) {
    console.log("🔵 [DEBUG] logActivity CHAMADA com:", data);
    try {
      const currentUser = auth.currentUser;
      if (!currentUser) {
        console.warn("logActivity: usuário não autenticado, atividade não foi salva.");
        return;
      }
      console.log("🔵 [DEBUG] usuário autenticado, uid:", currentUser.uid, "email:", currentUser.email);
      const ref = await db.collection("activity_logs").add({
        ...data,
        uid: currentUser.uid,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        clientTime: new Date().toISOString(),
      });
      console.log("✅ [DEBUG] logActivity SALVOU com sucesso! doc id:", ref.id);
    } catch(e) {
      const isPermission = e.code === "permission-denied" || (e.message && e.message.includes("Missing or insufficient permissions"));
      const isIndex      = e.code === "failed-precondition" || (e.message && e.message.includes("index"));

      if (isPermission) {
        console.error("🔴 FIRESTORE PERMISSION ERROR — atividade NÃO foi salva.", e);
        if (!window.__permissionAlertShown) {
          window.__permissionAlertShown = true;
          alert("⚠️ Erro de Permissão do Firestore\n\nAs atividades dos alunos NÃO estão sendo salvas.\n\nAtualize as Firestore Rules no console do Firebase e recarregue a página.\n\nDetalhes: " + e.message);
        }
      } else if (isIndex) {
        console.error("🟡 FIRESTORE INDEX ERROR — atividade NÃO foi salva.", e);
        if (!window.__indexAlertShown) {
          window.__indexAlertShown = true;
          alert("⚠️ Índice ausente no Firestore\n\nAs atividades NÃO estão sendo salvas.\n\nAbra o console do Firebase > Firestore > Indexes e crie os índices necessários.\n\nDetalhes: " + e.message);
        }
      } else {
        console.error("🔴 Erro inesperado ao salvar atividade:", e.code, e.message);
      }
    }
  }

  async function fetchLogs() {
    try {
      const snap = await db.collection("activity_logs")
        .limit(2000)
        .get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      docs.sort((a, b) => {
        const ta = a.clientTime ? new Date(a.clientTime).getTime() : 0;
        const tb = b.clientTime ? new Date(b.clientTime).getTime() : 0;
        return tb - ta;
      });
      return docs;
    } catch(e) {
      const isPermission = e.code === "permission-denied" || (e.message && e.message.includes("Missing or insufficient permissions"));

      if (isPermission) {
        throw new Error("PERMISSION_DENIED: " + e.message);
      } else {
        throw new Error("UNKNOWN: " + e.message);
      }
    }
  }

  // ── LISTENING: converte um link comum do Google Drive (compartilhado como
  // "qualquer pessoa com o link") num link de streaming direto que funciona
  // dentro de uma tag <audio>.
  function extractDriveFileId(url) {
    if (!url) return null;
    const patterns = [
      /\/d\/([a-zA-Z0-9_-]{10,})/,      // .../file/d/ID/view
      /[?&]id=([a-zA-Z0-9_-]{10,})/,    // .../open?id=ID  ou  .../uc?id=ID
    ];
    for (const re of patterns) {
      const m = url.match(re);
      if (m) return m[1];
    }
    return null;
  }

  function driveLinkToAudioUrl(url) {
    const id = extractDriveFileId(url);
    if (!id) return url; // não parece um link do Drive, usa como veio (ex: link direto de outro host)
    return `https://drive.google.com/uc?export=download&id=${id}`;
  }

  // ── LISTENING: CRUD dos exercícios no Firestore. Nada disso mexe em código —
  // é só o professor preenchendo um formulário na tela de admin.
  async function fetchListeningExercises() {
    const snap = await db.collection("listening_exercises").orderBy("createdAt", "desc").get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function saveListeningExercise(data, id) {
    if (id) {
      await db.collection("listening_exercises").doc(id).set(data, { merge: true });
      return id;
    }
    const ref = await db.collection("listening_exercises").add({
      ...data,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    return ref.id;
  }

  async function deleteListeningExercise(id) {
    await db.collection("listening_exercises").doc(id).delete();
  }

  // ── LISTENING: progresso do aluno (1 doc por aluno+exercício)
  async function saveListeningProgress(exerciseId, data) {
    const user = auth.currentUser;
    if (!user) return;
    await db.collection("listening_progress").doc(`${user.uid}_${exerciseId}`).set({
      uid: user.uid,
      studentEmail: user.email,
      studentName: user.displayName || user.email,
      exerciseId,
      ...data,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge: true });
  }

  async function fetchListeningProgressForCurrentUser() {
    const user = auth.currentUser;
    if (!user) return {};
    const snap = await db.collection("listening_progress").where("uid", "==", user.uid).get();
    const map = {};
    snap.docs.forEach(d => { map[d.data().exerciseId] = d.data(); });
    return map;
  }
</script>

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function AdminDashboard({ user }) {
  const [logs,    setLogs]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const [tab,     setTab]     = useState("overview");

  useEffect(() => {
    fetchLogs()
      .then(d => { setLogs(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  const today = new Date().toDateString();

  const soundStats = {};
  logs.forEach(l => {
    const sound = l.pairSymbol || "Desconhecido";
    const word  = l.targetWord || "?";
    const key   = `${sound}|${word}`;
    if (!soundStats[key]) soundStats[key] = { sound, word, correct:0, errors:0, students: new Set() };
    l.isCorrect ? soundStats[key].correct++ : soundStats[key].errors++;
    if (l.studentEmail) soundStats[key].students.add(l.studentEmail);
  });

  const soundList = Object.values(soundStats).map(s => ({
    ...s,
    total:      s.correct + s.errors,
    errorRate:  s.correct + s.errors > 0 ? Math.round((s.errors / (s.correct + s.errors)) * 100) : 0,
    studentCount: s.students.size,
  })).sort((a,b) => b.errors - a.errors);

  const hardestSounds = soundList.slice(0, 5);

  const studentMap = {};
  logs.forEach(l => {
    const key = l.studentEmail || "unknown";
    if (!studentMap[key]) studentMap[key] = {
      name: l.studentName || "Anônimo",
      email: key,
      total: 0, correct: 0, todayTotal: 0,
      words: {},
    };
    studentMap[key].total++;
    if (l.isCorrect) studentMap[key].correct++;
    const logDate = l.clientTime ? new Date(l.clientTime).toDateString() : null;
    if (logDate === today) studentMap[key].todayTotal++;
    const w = l.targetWord || "?";
    if (!studentMap[key].words[w]) studentMap[key].words[w] = { correct:0, errors:0 };
    l.isCorrect ? studentMap[key].words[w].correct++ : studentMap[key].words[w].errors++;
  });

  const students = Object.values(studentMap).sort((a,b) => b.todayTotal - a.todayTotal);
  const totalAttempts = logs.length;
  const globalAccuracy = totalAttempts > 0
    ? Math.round((logs.filter(l=>l.isCorrect).length / totalAttempts) * 100)
    : 0;

  // Agrupa por dia + aluno: quantas tentativas cada aluno fez em cada dia
  const dailyMap = {};
  logs.forEach(l => {
    if (!l.clientTime) return;
    const d = new Date(l.clientTime);
    const dayKey = d.toLocaleDateString("pt-BR"); // ex: 22/06/2026
    const studentKey = l.studentEmail || "unknown";
    const mapKey = `${dayKey}|${studentKey}`;
    if (!dailyMap[mapKey]) {
      dailyMap[mapKey] = {
        dayKey,
        dayDate: new Date(d.getFullYear(), d.getMonth(), d.getDate()),
        studentEmail: studentKey,
        studentName: l.studentName || "Anônimo",
        attempts: 0,
        correct: 0,
      };
    }
    dailyMap[mapKey].attempts++;
    if (l.isCorrect) dailyMap[mapKey].correct++;
  });

  const dailyList = Object.values(dailyMap).sort((a,b) => b.dayDate - a.dayDate || a.studentName.localeCompare(b.studentName));

  // Agrupa só por dia (visão geral: quantos alunos distintos entraram naquele dia e total de tentativas)
  const dayOverviewMap = {};
  dailyList.forEach(d => {
    if (!dayOverviewMap[d.dayKey]) dayOverviewMap[d.dayKey] = { dayKey: d.dayKey, dayDate: d.dayDate, students: new Set(), attempts: 0 };
    dayOverviewMap[d.dayKey].students.add(d.studentEmail);
    dayOverviewMap[d.dayKey].attempts += d.attempts;
  });
  const dayOverviewList = Object.values(dayOverviewMap)
    .map(d => ({ ...d, studentCount: d.students.size }))
    .sort((a,b) => b.dayDate - a.dayDate);


  const TAB_STYLE = (active) => ({
    padding:".45rem 1rem", borderRadius:".65rem", border:"none",
    background: active ? "#334155" : "transparent",
    color: active ? "#f8fafc" : "#64748b",
    fontWeight: 700, fontSize:".8rem", cursor:"pointer", transition:"all .15s",
  });

  return (
    <div className="fade-in" style={{minHeight:"100vh",padding:"1.5rem",maxWidth:740,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.5rem",flexWrap:"wrap",gap:"1rem"}}>
        <div>
          <h1 style={{margin:0,fontSize:"1.4rem",fontWeight:900,color:"#f8fafc"}}>🛡️ Painel do Professor</h1>
          <p style={{margin:"4px 0 0",fontSize:".75rem",color:"#64748b"}}>{user.email}</p>
        </div>
        <button onClick={signOut} style={{background:"#1e293b",color:"#fb7185",border:"1px solid #3f0a0a",padding:".5rem 1rem",borderRadius:".75rem",fontWeight:700,fontSize:".8rem"}}>Sair</button>
      </div>

      {error && (
        <div style={{background:"#450a0a",border:"1px solid #dc2626",borderRadius:"1rem",padding:"1rem 1.25rem",marginBottom:"1.5rem",color:"#fca5a5",fontSize:".85rem",lineHeight:1.6}}>
          <strong>🔴 Erro ao carregar dados do Firestore:</strong><br/>
          {error.startsWith("PERMISSION_DENIED") && (
            <span>As Firestore Rules estão bloqueando a leitura. Aplique as regras abaixo e recarregue.<br/>
            <code style={{fontSize:".7rem",background:"#0f172a",padding:"4px 8px",borderRadius:4,display:"block",marginTop:6,lineHeight:1.8}}>
              {`rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /activity_logs/{docId} {\n      allow create: if request.auth != null;\n      allow read, list: if request.auth != null\n        && request.auth.token.email == "francwrlanh19@gmail.com";\n    }\n  }\n}`}
            </code>
            </span>
          )}
          <code style={{fontSize:".72rem",opacity:.8}}>{error}</code>
        </div>
      )}

      {loading ? <Spinner/> : (
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"1rem",marginBottom:"1.5rem"}}>
            {[
              {label:"Tentativas hoje", value: logs.filter(l => l.clientTime && new Date(l.clientTime).toDateString()===today).length, color:"#818cf8"},
              {label:"Total histórico", value: totalAttempts, color:"#2dd4bf"},
              {label:"Alunos ativos",   value: students.length, color:"#60a5fa"},
              {label:"Acertos globais", value:`${globalAccuracy}%`, color: globalAccuracy>=70?"#4ade80":"#fb7185"},
            ].map(k=>(
              <div key={k.label} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.1rem",textAlign:"center"}}>
                <div style={{fontSize:"1.8rem",fontWeight:900,color:k.color}}>{k.value}</div>
                <div style={{fontSize:".68rem",color:"#64748b",marginTop:4}}>{k.label}</div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:6,marginBottom:"1.25rem",background:"#0f172a",padding:6,borderRadius:".85rem",width:"fit-content"}}>
            <button style={TAB_STYLE(tab==="overview")}  onClick={()=>setTab("overview")}>📊 Sons Difíceis</button>
            <button style={TAB_STYLE(tab==="students")}  onClick={()=>setTab("students")}>👩‍🎓 Alunos</button>
            <button style={TAB_STYLE(tab==="daily")}      onClick={()=>setTab("daily")}>📅 Entradas por dia</button>
            <button style={TAB_STYLE(tab==="activity")}  onClick={()=>setTab("activity")}>📋 Atividade</button>
            <button style={TAB_STYLE(tab==="listening")}  onClick={()=>setTab("listening")}>🎧 Listening</button>
          </div>

          {tab === "overview" && (
            <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
              <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.25rem"}}>
                <h3 style={{margin:"0 0 .25rem",fontSize:".95rem",fontWeight:800,color:"#f8fafc"}}>🔊 Sons que a turma mais erra</h3>
                <p style={{margin:"0 0 1rem",fontSize:".72rem",color:"#64748b"}}>Ordenado por número de erros — foque o próximo exercício nestes</p>
                {hardestSounds.length === 0 ? (
                  <p style={{color:"#475569",fontSize:".85rem",textAlign:"center",padding:"1rem"}}>Nenhum dado ainda. Os alunos precisam praticar primeiro.</p>
                ) : hardestSounds.map((s, i) => (
                  <div key={s.word+i} style={{display:"flex",alignItems:"center",gap:"1rem",padding:".75rem 0",borderBottom:"1px solid #0f172a"}}>

                        <span style={{fontFamily:"monospace",fontSize:".7rem",color:"#94a3b8",background:"#0f172a",padding:"2px 8px",borderRadius:"999px"}}>{s.sound}</span>
                      </div>
                      <div style={{height:6,background:"#0f172a",borderRadius:999,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${s.errorRate}%`,background: s.errorRate>60?"#fb7185": s.errorRate>30?"#fbbf24":"#4ade80",borderRadius:999,transition:"width .4s"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>

                      </div>

                ))}
              </div>

              {soundList.length > 5 && (
                <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.25rem"}}>
                  <h3 style={{margin:"0 0 1rem",fontSize:".9rem",fontWeight:800,color:"#94a3b8"}}>Todos os sons praticados</h3>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",color:"#cbd5e1"}}>
                      <thead><tr style={{color:"#64748b"}}>
                        {["Palavra","Som","Erros","Acertos","Taxa de erro"].map(h=><th key={h} style={{textAlign:"left",padding:"4px 8px"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {soundList.map((s,i)=>(
                          <tr key={i} style={{borderTop:"1px solid #0f172a"}}>
                            <td style={{padding:"6px 8px",fontWeight:700}}>{s.word}</td>
                            <td style={{padding:"6px 8px",fontFamily:"monospace",fontSize:".7rem",color:"#94a3b8"}}>{s.sound}</td>
                            <td style={{padding:"6px 8px",color:"#fb7185",fontWeight:700}}>{s.errors}</td>
                            <td style={{padding:"6px 8px",color:"#4ade80",fontWeight:700}}>{s.correct}</td>
                            <td style={{padding:"6px 8px"}}>
                              <span style={{color: s.errorRate>60?"#fb7185": s.errorRate>30?"#fbbf24":"#4ade80",fontWeight:800}}>{s.errorRate}%</span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}

          {tab === "students" && (
            <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
              {students.length === 0 ? (
                <p style={{color:"#475569",textAlign:"center",padding:"2rem"}}>Nenhum aluno ainda.</p>
              ) : students.map(s => {
                const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) : 0;
                const worstWord = Object.entries(s.words)
                  .sort(([,a],[,b]) => b.errors - a.errors)[0];

                return (
                  <div key={s.email} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.25rem"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"0.5rem",marginBottom:"0.75rem"}}>
                      <div>
                        <p style={{margin:0,fontWeight:800,color:"#f8fafc",fontSize:".95rem"}}>{s.name}</p>
                        <p style={{margin:"2px 0 0",fontSize:".68rem",color:"#475569"}}>{s.email}</p>
                      </div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        <span style={{background:"#0f172a",color:"#818cf8",padding:"4px 10px",borderRadius:"999px",fontSize:".72rem",fontWeight:700}}>{s.todayTotal} hoje</span>
                        <span style={{background:"#0f172a",color:"#60a5fa",padding:"4px 10px",borderRadius:"999px",fontSize:".72rem",fontWeight:700}}>{s.total} total</span>
                        <span style={{background:"#0f172a",color:acc>=70?"#4ade80":"#fb7185",padding:"4px 10px",borderRadius:"999px",fontSize:".72rem",fontWeight:700}}>{acc}% acerto</span>
                      </div>

                    {worstWord && worstWord[1].errors > 0 && (
                      <div style={{background:"#0f172a",borderRadius:".75rem",padding:".6rem .85rem",fontSize:".75rem",color:"#fde68a",display:"flex",alignItems:"center",gap:6}}>
                        <span>⚠️</span>
                        <span>Maior dificuldade: <strong>"{worstWord[0]}"</strong> — {worstWord[1].errors} erro(s), {worstWord[1].correct} acerto(s)</span>
                      </div>
                    )}
                    {(!worstWord || worstWord[1].errors === 0) && s.total > 0 && (
                      <div style={{background:"#0f172a",borderRadius:".75rem",padding:".6rem .85rem",fontSize:".75rem",color:"#86efac",display:"flex",alignItems:"center",gap:6}}>
                        <span>✅</span><span>Sem erros registrados ainda — ótimo!</span>

                <h3 style={{margin:"0 0 .25rem",fontSize:".95rem",fontWeight:800,color:"#f8fafc"}}>📅 Resumo por dia</h3>
                <p style={{margin:"0 0 1rem",fontSize:".72rem",color:"#64748b"}}>Quantos alunos entraram e quantas tentativas no total, por dia</p>

                  <p style={{color:"#475569",fontSize:".85rem",textAlign:"center",padding:"1rem"}}>Nenhum dado ainda.</p>
                ) : (
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:".8rem",color:"#cbd5e1"}}>
                      <thead><tr style={{color:"#64748b"}}>
                        {["Dia","Alunos que entraram","Total de tentativas"].map(h=><th key={h} style={{textAlign:"left",padding:"6px 8px"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {dayOverviewList.map(d=>(
                          <tr key={d.dayKey} style={{borderTop:"1px solid #0f172a"}}>
                            <td style={{padding:"6px 8px",fontWeight:700,color:"#f8fafc"}}>{d.dayKey}</td>
                            <td style={{padding:"6px 8px",color:"#818cf8",fontWeight:700}}>{d.studentCount}</td>

                  <p style={{color:"#475569",fontSize:".85rem",textAlign:"center",padding:"1rem"}}>Nenhum dado ainda.</p>

              </div>
            </div>
          )}

          {tab === "listening" && <ListeningAdminPanel />}
        </>
      )}
    </div>

}

// ── LISTENING (ADMIN) ──────────────────────────────────────────────────────
// Painel onde o professor cadastra, edita e apaga exercícios de listening,
// sem precisar tocar em código. Cada exercício vira 1 documento no Firestore.
const LISTENING_LEVELS = ["Iniciante", "Intermediário", "Avançado", "Todos os níveis"];

function emptyQuestion() {
  return { id: Math.random().toString(36).slice(2), text: "", options: ["", ""], correct: 0 };
}

function emptyExercise() {
  return { title: "", level: "Todos os níveis", driveLink: "", transcript: "", questions: [emptyQuestion()] };
}

function ListeningAdminPanel() {
  const [items, setItems]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [editing, setEditing] = useState(null); // null = lista | {} novo | objeto = editar
  const [busyId, setBusyId]   = useState(null);

  function reload() {
    setLoading(true);
    fetchListeningExercises()
      .then(d => { setItems(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }

  useEffect(() => { reload(); }, []);

  async function handleDelete(id) {
    if (!confirm("Apagar este exercício de listening? Essa ação não pode ser desfeita.")) return;
    setBusyId(id);
    try { await deleteListeningExercise(id); reload(); }
    catch (e) { alert("Erro ao apagar: " + e.message); }
    finally { setBusyId(null); }
  }

  if (editing !== null) {
    return (
      <ListeningExerciseForm
        initial={editing}
        onCancel={() => setEditing(null)}
        onSaved={() => { setEditing(null); reload(); }}
      />
    );
  }

  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <p style={{margin:0,fontSize:".78rem",color:"#64748b"}}>{items.length} exercício(s) cadastrado(s)</p>
        <button onClick={() => setEditing(emptyExercise())}
          style={{background:"linear-gradient(135deg,#818cf8,#6366f1)",color:"#fff",border:"none",padding:".55rem 1.1rem",borderRadius:".75rem",fontWeight:800,fontSize:".8rem"}}>
          + Novo exercício
        </button>
      </div>

      {error && <p style={{color:"#fb7185",fontSize:".8rem"}}>{error}</p>}
      {loading ? <Spinner/> : items.length === 0 ? (
        <p style={{color:"#475569",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Nenhum exercício de listening ainda. Clique em "+ Novo exercício" pra criar o primeiro.</p>
      ) : (
        items.map(ex => (
          <div key={ex.id} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.1rem 1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"1rem",flexWrap:"wrap"}}>
            <div>
              <p style={{margin:0,fontWeight:800,color:"#f8fafc",fontSize:".9rem"}}>{ex.title || "(sem título)"}</p>
              <p style={{margin:"4px 0 0",fontSize:".7rem",color:"#94a3b8"}}>
                {ex.level} · {(ex.questions||[]).length} pergunta(s)
              </p>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={() => setEditing(ex)}
                style={{background:"#0f172a",color:"#f8fafc",border:"1px solid #334155",padding:".45rem .9rem",borderRadius:".65rem",fontWeight:700,fontSize:".75rem"}}>
                ✏️ Editar
              </button>
              <button onClick={() => handleDelete(ex.id)} disabled={busyId===ex.id}
                style={{background:"#0f172a",color:"#fb7185",border:"1px solid #3f0a0a",padding:".45rem .9rem",borderRadius:".65rem",fontWeight:700,fontSize:".75rem",opacity:busyId===ex.id?.5:1}}>
                {busyId===ex.id ? "..." : "🗑️ Apagar"}
              </button>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

const INPUT_STYLE = {
  width:"100%", background:"#0f172a", border:"1px solid #334155", color:"#f8fafc",
  padding:".7rem .9rem", borderRadius:".75rem", fontSize:".85rem", outline:"none",
};
const LABEL_STYLE = { display:"block", fontSize:".72rem", fontWeight:700, color:"#94a3b8", marginBottom:".4rem" };

function ListeningExerciseForm({ initial, onCancel, onSaved }) {
  const isNew = !initial.id;
  const [title, setTitle]           = useState(initial.title || "");
  const [level, setLevel]           = useState(initial.level || LISTENING_LEVELS[0]);
  const [driveLink, setDriveLink]   = useState(initial.driveLink || "");
  const [transcript, setTranscript] = useState(initial.transcript || "");
  const [questions, setQuestions]   = useState(
    initial.questions && initial.questions.length > 0 ? initial.questions : [emptyQuestion()]
  );
  const [saving, setSaving] = useState(false);
  const [err, setErr]       = useState(null);

  function updateQuestion(qid, patch) {
    setQuestions(qs => qs.map(q => q.id === qid ? { ...q, ...patch } : q));
  }
  function updateOption(qid, optIdx, value) {
    setQuestions(qs => qs.map(q => q.id === qid ? { ...q, options: q.options.map((o,i)=> i===optIdx ? value : o) } : q));
  }
  function addOption(qid) {
    setQuestions(qs => qs.map(q => q.id === qid && q.options.length < 6 ? { ...q, options: [...q.options, ""] } : q));
  }
  function removeOption(qid, optIdx) {
    setQuestions(qs => qs.map(q => {
      if (q.id !== qid || q.options.length <= 2) return q;
      const options = q.options.filter((_,i)=>i!==optIdx);
      const correct = q.correct >= options.length ? 0 : (optIdx < q.correct ? q.correct - 1 : q.correct);
      return { ...q, options, correct };
    }));
  }
  function addQuestion() { setQuestions(qs => [...qs, emptyQuestion()]); }
  function removeQuestion(qid) { setQuestions(qs => qs.length > 1 ? qs.filter(q=>q.id!==qid) : qs); }

  async function handleSubmit(e) {
    e.preventDefault();
    setErr(null);

    if (!title.trim())      return setErr("Dê um título ao exercício.");
    if (!driveLink.trim())  return setErr("Cole o link do áudio no Google Drive.");
    if (questions.some(q => !q.text.trim() || q.options.some(o=>!o.trim())))
      return setErr("Preencha todas as perguntas e alternativas (não deixe nenhuma em branco).");

    setSaving(true);
    try {
      const audioUrl = driveLinkToAudioUrl(driveLink.trim());
      await saveListeningExercise({
        title: title.trim(),
        level,
        driveLink: driveLink.trim(),
        audioUrl,
        transcript: transcript.trim(),
        questions: questions.map(q => ({ text: q.text.trim(), options: q.options.map(o=>o.trim()), correct: q.correct })),
      }, initial.id);
      onSaved();
    } catch (e2) {
      setErr("Erro ao salvar: " + e2.message);
      setSaving(false);
    }
  }

  return (
    <form onSubmit={handleSubmit} className="fade-in" style={{display:"flex",flexDirection:"column",gap:"1.1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h3 style={{margin:0,fontSize:"1rem",fontWeight:900,color:"#f8fafc"}}>{isNew ? "Novo exercício de listening" : "Editar exercício"}</h3>
        <button type="button" onClick={onCancel} style={{background:"transparent",border:"none",color:"#64748b",fontSize:".8rem"}}>✕ Cancelar</button>
      </div>

      {err && <div style={{background:"#450a0a",border:"1px solid #dc2626",color:"#fca5a5",borderRadius:".75rem",padding:".75rem 1rem",fontSize:".8rem"}}>{err}</div>}

      <div>
        <label style={LABEL_STYLE}>Título</label>
        <input style={INPUT_STYLE} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ex: Semana 12 — Podcast sobre viagens" />
      </div>

      <div>
        <label style={LABEL_STYLE}>Nível / turma</label>
        <select style={INPUT_STYLE} value={level} onChange={e=>setLevel(e.target.value)}>
          {LISTENING_LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
        </select>
      </div>

      <div>
        <label style={LABEL_STYLE}>Link do áudio (Google Drive)</label>
        <input style={INPUT_STYLE} value={driveLink} onChange={e=>setDriveLink(e.target.value)} placeholder="Cole aqui o link de compartilhamento do Drive" />
        <p style={{margin:".4rem 0 0",fontSize:".68rem",color:"#475569"}}>No Drive: botão direito no arquivo → Compartilhar → "Qualquer pessoa com o link" → Copiar link.</p>
      </div>

      <div>
        <label style={LABEL_STYLE}>Transcrição</label>
        <textarea style={{...INPUT_STYLE,minHeight:120,resize:"vertical",fontFamily:"inherit"}} value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="Cole aqui o texto que o áudio fala" />
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
        <label style={LABEL_STYLE}>Perguntas de múltipla escolha</label>
        {questions.map((q, qi) => (
          <div key={q.id} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:"1rem",padding:"1rem",display:"flex",flexDirection:"column",gap:".65rem"}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:".72rem",fontWeight:800,color:"#818cf8"}}>Pergunta {qi+1}</span>
              {questions.length > 1 && (
                <button type="button" onClick={()=>removeQuestion(q.id)} style={{marginLeft:"auto",background:"transparent",border:"none",color:"#fb7185",fontSize:".72rem"}}>Remover pergunta</button>
              )}
            </div>
            <input style={INPUT_STYLE} value={q.text} onChange={e=>updateQuestion(q.id,{text:e.target.value})} placeholder="Digite a pergunta" />
            {q.options.map((opt, oi) => (
              <div key={oi} style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="radio" name={`correct-${q.id}`} checked={q.correct===oi} onChange={()=>updateQuestion(q.id,{correct:oi})} />
                <input style={{...INPUT_STYLE,flex:1}} value={opt} onChange={e=>updateOption(q.id,oi,e.target.value)} placeholder={`Alternativa ${oi+1}`} />
                {q.options.length > 2 && (
                  <button type="button" onClick={()=>removeOption(q.id,oi)} style={{background:"transparent",border:"none",color:"#64748b",fontSize:"1rem"}}>✕</button>
                )}
              </div>
            ))}
            <p style={{margin:0,fontSize:".65rem",color:"#475569"}}>Marque a bolinha ao lado da alternativa correta.</p>
            {q.options.length < 6 && (
              <button type="button" onClick={()=>addOption(q.id)} style={{alignSelf:"flex-start",background:"transparent",border:"1px dashed #334155",color:"#94a3b8",padding:".35rem .7rem",borderRadius:".6rem",fontSize:".72rem"}}>+ Alternativa</button>
            )}
          </div>
        ))}
        <button type="button" onClick={addQuestion} style={{alignSelf:"flex-start",background:"#1e293b",border:"1px solid #334155",color:"#f8fafc",padding:".5rem 1rem",borderRadius:".75rem",fontWeight:700,fontSize:".8rem"}}>+ Adicionar pergunta</button>
      </div>

      <button type="submit" disabled={saving}
        style={{background:"linear-gradient(135deg,#818cf8,#6366f1)",color:"#fff",border:"none",padding:"1rem",borderRadius:"1rem",fontWeight:800,fontSize:".9rem",opacity:saving?.6:1}}>
        {saving ? "Salvando..." : "💾 Salvar exercício"}
      </button>
    </form>
  );
}

// Escolhe a melhor voz disponível no navegador para o idioma pedido,
// preferindo uma voz masculina quando o navegador expõe essa informação
// (nem todo navegador/SO marca o gênero da voz no nome).
function pickVoice(langCode) {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;

  const sameLang = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith(langCode.toLowerCase().slice(0,2)));
  if (sameLang.length === 0) return null;

  const maleHints = ["male","mann","herre","man)","(man","david","james","daniel","george","fredrik","henrik","olav","erik","magnus"];
  const male = sameLang.find(v => maleHints.some(h => v.name.toLowerCase().includes(h)));
  if (male) return male;

  // Sem marcação de gênero disponível: usa a primeira voz nativa (não remota) do idioma
  const local = sameLang.find(v => v.localService);
  return local || sameLang[0];
}

function WordCard({ wordData, accent, isTarget, isSolved, onSelect, isTwister, track }) {
  const [speaking, setSpeaking] = useState(false);

  function handleSpeak(e) {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(wordData.word);
    utt.lang = track === "no" ? "nb-NO" : "en-US";
    utt.rate = isTwister ? .72 : .85;
    const voice = pickVoice(utt.lang);
    if (voice) utt.voice = voice;
    setSpeaking(true);
    utt.onend = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utt);
  }

  return (
    <div onClick={onSelect} className="word-card-hover"
      style={{
        background: isTarget ? "#1e293b" : "#0f172a",
        border: isTarget ? `2.5px solid ${accent}` : isSolved ? "2.5px solid #059669" : (isTwister ? "2px dashed #334155" : "2px solid #1e293b"),
        boxShadow: isTarget ? `0 0 0 4px ${accent}33` : isSolved ? "0 0 0 4px #05966933" : "none",
        transition:"all .2s ease", flex:1, width:"100%",

      <span style={{fontSize:"1.2rem",fontWeight:800,color:"#f8fafc",textAlign:"center",lineHeight:1.2}}>{wordData.word}</span>
      <span style={{fontFamily:"monospace",fontSize:".78rem",color:"#94a3b8"}}>{wordData.ipa}</span>

      }}>

          {speaking
            ? <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            : <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>}
        </svg>
        {speaking ? "Playing…" : "Listen"}

      {isTarget && <span style={{color:accent,fontSize:".7rem",fontWeight:800,marginTop:2}}>✓ Selected</span>}

function PracticeRecorder({ accent }) {
  const [state, setState]       = useState("idle");
  const [audioUrl, setAudioUrl] = useState(null);
  const mediaRecRef = useRef(null);
  const chunksRef   = useRef([]);
  const streamRef   = useRef(null);

  async function startRec() {
    let stream;
    try { stream = await navigator.mediaDevices.getUserMedia({ audio:true }); }
    catch { return; }
    streamRef.current = stream;
    chunksRef.current = [];
    if (audioUrl) { URL.revokeObjectURL(audioUrl); setAudioUrl(null); }

    const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus"
                   : MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "";
    const mr = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecRef.current = mr;

    mr.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
    mr.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunksRef.current, { type: mimeType || "audio/webm" });
      setAudioUrl(URL.createObjectURL(blob));
      setState("done");
    };
    mr.start(100);
    setState("recording");
  }

  function stopRec() {
    if (mediaRecRef.current && mediaRecRef.current.state === "recording") mediaRecRef.current.stop();
  }

  function reset() {
    if (audioUrl) URL.revokeObjectURL(audioUrl);
    setAudioUrl(null); setState("idle");
  }

  return (
    <div style={{background:"#0f172a",border:`1px dashed ${accent}55`,borderRadius:"1rem",padding:"1rem",display:"flex",flexDirection:"column",gap:"0.75rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:".72rem",fontWeight:800,color:accent,textTransform:"uppercase",letterSpacing:1}}>🎙 Practice — Record & Compare</span>
        <span style={{fontSize:".65rem",color:"#475569"}}>(no scoring)</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",flexWrap:"wrap"}}>
        {state !== "recording" ? (
          <button onClick={startRec} style={{display:"flex",alignItems:"center",gap:6,background:`${accent}22`,color:accent,border:`1px solid ${accent}55`,padding:".5rem 1rem",borderRadius:".75rem",fontSize:".8rem",fontWeight:700,transition:"all .2s"}}>
            <svg style={{width:14,height:14}} fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            {state === "done" ? "Record Again" : "Start Recording"}
          </button>
        ) : (
          <button onClick={stopRec} className="rec-pulse" style={{display:"flex",alignItems:"center",gap:6,background:"#312e81",color:"#a5b4fc",border:"1px solid #4f46e5",padding:".5rem 1rem",borderRadius:".75rem",fontSize:".8rem",fontWeight:700}}>
            <WaveBars color="#a5b4fc"/>
            Stop
          </button>
        )}
        {state === "done" && (
          <button onClick={reset} style={{background:"transparent",color:"#475569",border:"1px solid #334155",padding:".5rem .75rem",borderRadius:".75rem",fontSize:".75rem"}}>
            ✕ Clear
          </button>
        )}
      </div>
      {audioUrl && (
        <div className="fade-in">
          <p style={{margin:"0 0 6px",fontSize:".68rem",color:"#64748b",fontWeight:600}}>🎧 Your recording — compare with the Listen button above:</p>
          <audio controls src={audioUrl} style={{width:"100%",borderRadius:6}}/>
        </div>
      )}
    </div>
  );
}

function ScoreRecognizer({ targetWord, accent, onResult, solved, track }) {
  const [phase,   setPhase]   = useState("idle");
  const [interim, setInterim] = useState("");
  const [final,   setFinal]   = useState("");
  const recRef = useRef(null);

  useEffect(() => {
    return () => { try { recRef.current && recRef.current.stop(); } catch {} };
  }, []);

  useEffect(() => {
    try { recRef.current && recRef.current.abort(); } catch {}
    recRef.current = null;
    setPhase("idle"); setInterim(""); setFinal("");
  }, [targetWord]);

  function startListening() {
    if (solved) return;
    if (phase === "listening") {
      try { recRef.current && recRef.current.stop(); } catch {}
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { onResult("__no_sr__"); return; }

    const rec = new SR();
    rec.lang = track === "no" ? "nb-NO" : "en-US";
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 5;
    recRef.current = rec;

    rec.onstart = () => { setPhase("listening"); setInterim(""); setFinal(""); };

    rec.onresult = (e) => {
      const result = e.results[e.results.length - 1];
      const best   = result[0].transcript;
      if (result.isFinal) {
        const alts = Array.from(result).map(r => r.transcript);
        setFinal(best); setInterim(""); setPhase("done");
        onResult(best, alts);
      } else {
        setInterim(best);
      }
    };

    rec.onerror = (e) => {
      if (e.error !== "aborted") {
        setPhase("idle");
        if (e.error === "not-allowed") onResult("__mic_denied__");
        else onResult("");
      }
    };

    rec.onend = () => {
      setPhase(p => p === "listening" ? "idle" : p);
    };

    try { rec.start(); }
    catch { setPhase("idle"); }
  }

  const isListening = phase === "listening";
  const showText    = interim || final;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"0.9rem"}}>
      <button
        onClick={startListening}
        disabled={solved}
        className={isListening ? "mic-pulse" : ""}
        style={{
          width:80, height:80, borderRadius:"50%", border:"none",
          background: solved
            ? "linear-gradient(135deg,#059669,#047857)"
            : isListening
              ? "linear-gradient(135deg,#ef4444,#dc2626)"
              : `linear-gradient(135deg,${accent},${accent}bb)`,
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          gap:3, transition:"all .2s",
          boxShadow: isListening ? "none" : solved ? "0 8px 20px rgba(5,150,105,.35)" : `0 8px 24px ${accent}44`,
          opacity: solved ? .7 : 1
        }}>
        <svg style={{width:34,height:34,fill:"#fff"}} viewBox="0 0 24 24">
          {solved
            ? <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            : isListening

function ExerciseView({ pair, user, track, onCorrectAnswer, onNext, isLast, progressText, nextLabel }) {
  const isTwisterOnly = pair.type === "twister_only";

  const [targetIndex, setTargetIndex] = useState(isTwisterOnly ? 0 : null);
  const [feedback,    setFeedback]    = useState(null);
  const [feedbackMsg, setFeedbackMsg] = useState("");
  const [attempts,    setAttempts]    = useState(0);
  const [solvedSet,   setSolvedSet]   = useState(new Set());

  const { accent, words, twister, tip } = pair;
  const totalToSolve = isTwisterOnly ? 1 : 3;
  const allSolved = solvedSet.size >= totalToSolve;

  useEffect(() => {
    setTargetIndex(isTwisterOnly ? 0 : null);
    setFeedback(null); setFeedbackMsg("");
    setAttempts(0); setSolvedSet(new Set());
  }, [pair]);

  function selectTarget(i) {
    if (isTwisterOnly) return;
    setTargetIndex(i); setFeedback(null); setFeedbackMsg(""); setAttempts(0);
  }

  function clean(s) { return s.toLowerCase().replace(/[.,!?'"]/g,"").trim(); }

  function handleResult(text, alts) {
    if (!text || text === "" || text === "__no_sr__" || text === "__mic_denied__") {
      if (text === "__mic_denied__") { setFeedback("info"); setFeedbackMsg("❌ Microphone permission denied. Allow mic access and try again."); return; }
      if (text === "__no_sr__")      { setFeedback("info"); setFeedbackMsg("⚠️ Speech recognition not supported in this browser. Try Chrome."); return; }
      setFeedback("other"); setFeedbackMsg("Couldn't hear anything — try speaking louder or closer to the mic."); return;
    }

    const isTwisterTarget = isTwisterOnly ? true : (targetIndex === 2);
    const targetWord      = isTwisterTarget ? twister.word : (words && words[targetIndex] ? words[targetIndex].word : "");
    const otherIndex      = isTwisterTarget ? -1 : (1 - targetIndex);

    const targetStr = clean(targetWord);
    const otherStr  = (!isTwisterTarget && otherIndex >= 0 && words) ? clean(words[otherIndex].word) : "";
    const allSpoken = [text, ...(alts||[])].map(clean);

    const hitsTarget = allSpoken.some(s => s.includes(targetStr) || targetStr.includes(s));
    const hitsOther  = otherStr && allSpoken.some(s => s.includes(otherStr) || otherStr.includes(s));
    const alreadySolved = solvedSet.has(targetIndex);

    logActivity({
      studentName:   user.displayName,
      studentEmail:  user.email,
      targetWord,
      pairSymbol:    pair.symbol,
      isCorrect:     hitsTarget,
      attemptNumber: attempts + 1,
      isTwister:     isTwisterTarget,
    });

    if (hitsTarget) {
      const pts = alreadySolved ? 0 : (attempts === 0) ? (isTwisterTarget ? 20 : 10) : 5;
      setFeedback("success");
      setSolvedSet(prev => new Set([...prev, targetIndex]));
      setFeedbackMsg(alreadySolved ? "✅ Correct again! (already scored)" : `🎉 Perfect! +${pts} points!`);
      confetti({ particleCount:90, spread:65, origin:{y:.6} });
      if (!alreadySolved) onCorrectAnswer(pts);
    } else if (!isTwisterTarget && hitsOther) {
      setAttempts(p=>p+1); setFeedback("close");
      setFeedbackMsg(`Oops! Sounded like "${words[otherIndex].word}". Adjust your mouth shape and try again!`);
    } else {
      setAttempts(p=>p+1); setFeedback("other");
      setFeedbackMsg(`Heard something else. Read the card text exactly and try again.`);
    }
  }

  const fStyle = {
    success: { bg:"#064e3b", border:"#059669", text:"#a7f3d0" },
    close:   { bg:"#78350f", border:"#d97706", text:"#fde68a" },
    other:   { bg:"#1e293b", border:"#475569", text:"#f8fafc" },
    info:    { bg:"#1e3a8a", border:"#2563eb", text:"#bfdbfe" },
  };

  const needsTarget      = !isTwisterOnly && targetIndex === null;
  const targetWord       = isTwisterOnly
    ? twister.word
    : (targetIndex === 2 ? twister.word : (targetIndex !== null && words ? words[targetIndex]?.word : null));
  const currentCardSolved = targetIndex !== null && solvedSet.has(targetIndex);

  return (
    <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:"1.25rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <span style={{fontFamily:"monospace",fontSize:"1.15rem",fontWeight:900,color:accent}}>{pair.symbol}</span>
        <span style={{background:"#1e293b",color:"#94a3b8",fontSize:".78rem",fontWeight:700,padding:"4px 14px",borderRadius:"999px",border:"1px solid #334155"}}>{progressText}</span>
      </div>

      {isTwisterOnly && (
        <div style={{background:`${accent}18`,borderLeft:`4px solid ${accent}`,borderRadius:".5rem 1rem 1rem .5rem",padding:".65rem 1rem",fontSize:".78rem",fontWeight:700,color:accent}}>
          👅 Tongue Twister Exercise — Foque no ritmo e na precisão fonética
        </div>
      )}

      <div style={{background:`${accent}18`,borderLeft:`4px solid ${accent}`,borderRadius:".5rem 1rem 1rem .5rem",padding:"1rem 1.25rem",color:"#cbd5e1",lineHeight:1.6,fontSize:".85rem"}}>
        <span style={{color:accent,fontWeight:800,display:"block",marginBottom:6,fontSize:".9rem"}}>💡 Pronunciation Tip:</span>
        {tip}
      </div>

      {!isTwisterOnly && words && (
        <div style={{display:"flex",gap:".75rem"}}>
          {words.map((w,i) => (
            <WordCard key={w.word} wordData={w} accent={accent} isTarget={targetIndex===i} isSolved={solvedSet.has(i)} onSelect={()=>selectTarget(i)} track={track} />
          ))}
        </div>
      )}

      <WordCard
        wordData={twister}
        accent={accent}
        isTarget={isTwisterOnly ? true : targetIndex===2}
        isSolved={solvedSet.has(isTwisterOnly ? 0 : 2)}
        onSelect={isTwisterOnly ? ()=>{} : ()=>selectTarget(2)}
        isTwister={true}
        track={track}
      />

      <div style={{background:"#1e293b",borderRadius:"1.5rem",padding:"1.5rem",border:"1px solid #334155",display:"flex",flexDirection:"column",gap:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:".78rem",fontWeight:800,color:"#f8fafc",textTransform:"uppercase",letterSpacing:.8}}>🎯 Speak to Score</span>
          {targetWord && !currentCardSolved && (
            <span style={{fontSize:".72rem",color:accent,fontWeight:600}}>
              — say: <strong>"{targetWord}"</strong>
            </span>
          )}
          {allSolved && (
            <span style={{fontSize:".72rem",color:"#4ade80",fontWeight:700}}>
              {isTwisterOnly ? "🏅 Twister done!" : "🏅 All 3 done!"}
            </span>
          )}
        </div>

        {needsTarget ? (
          <div style={{textAlign:"center",padding:"1rem 0",color:"#64748b",fontSize:".85rem"}}>
            👆 Select a word card above, then speak to score points
          </div>
        ) : (
          <ScoreRecognizer
            targetWord={targetWord}
            accent={accent}
            onResult={handleResult}
            solved={currentCardSolved}
            track={track}
          />
        )}

        {feedback && fStyle[feedback] && (
          <div className="fade-in" style={{background:fStyle[feedback].bg,border:`1px solid ${fStyle[feedback].border}`,color:fStyle[feedback].text,borderRadius:"1rem",padding:".8rem 1rem",fontSize:".85rem",fontWeight:600,textAlign:"center"}}>
            {feedbackMsg}
          </div>
        )}
      </div>

      <PracticeRecorder accent={accent} />

      <button onClick={onNext}
        style={{background:"transparent",color:"#94a3b8",border:"1px solid #475569",padding:"1.1rem",borderRadius:"1rem",fontSize:"1rem",fontWeight:800,transition:"all .2s"}}
        onMouseOver={e=>{e.currentTarget.style.background="#1e293b";e.currentTarget.style.color="#f8fafc";}}
        onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color="#94a3b8";}}>
        {isLast ? "Finish Training 🏁" : (nextLabel || "Next Exercise ➔")}
      </button>
    </div>
  );
}

function SpeakerButton({ word, accent, track }) {
  const [speaking, setSpeaking] = useState(false);

  function handleSpeak(e) {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = track === "no" ? "nb-NO" : "en-US";
    utt.rate = 0.9;
    const voice = pickVoice(utt.lang);
    if (voice) utt.voice = voice;
    setSpeaking(true);
    utt.onend = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utt);
  }

  return (
    <button onClick={handleSpeak} aria-label={`Ouvir ${word}`}
      style={{
        background:"transparent", border:"none", fontSize:"1.15rem",
        padding:".2rem .35rem", borderRadius:".5rem", lineHeight:1,
        opacity: speaking ? .45 : 1, transition:"opacity .15s, transform .12s",
      }}
      onMouseOver={e=>e.currentTarget.style.transform="scale(1.15)"}
      onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
      🔊
    </button>
  );
}

// Hook que conecta o evento global beforeinstallprompt (capturado fora do React,
// no <head>) ao ciclo de vida de componentes. Retorna se dá pra instalar agora
// e uma função pra disparar o prompt nativo do Chrome.
function usePwaInstall() {
  const [installEvent, setInstallEvent] = useState(window.__deferredInstallPrompt);
  const [installed, setInstalled] = useState(false);

  useEffect(() => {
    const handler = (e) => setInstallEvent(e);
    window.__pwaInstallListeners.push(handler);
    return () => {
      window.__pwaInstallListeners = window.__pwaInstallListeners.filter(cb => cb !== handler);
    };
  }, []);

  async function promptInstall() {
    if (!installEvent) return;
    installEvent.prompt();
    const { outcome } = await installEvent.userChoice;
    if (outcome === "accepted") setInstalled(true);
    setInstallEvent(null);
    window.__deferredInstallPrompt = null;
  }

  const canInstall = !!installEvent && !installed;
  return { canInstall, promptInstall };
}

  if (!canInstall || dismissed) return null;

  return (
    <div className="fade-in" style={{
      position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200,
      background: "#1e293b", borderTop: "1px solid #334155",
      padding: "0.85rem 1.1rem", display: "flex", alignItems: "center",
      gap: "0.85rem", boxShadow: "0 -8px 24px rgba(0,0,0,.35)",
    }}>
      <span style={{ fontSize: "1.6rem", flexShrink: 0 }}>🇬🇧</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ margin: 0, fontWeight: 800, fontSize: ".85rem", color: "#f8fafc" }}>
          Instale o Pronunciation Builder
        </p>
        <p style={{ margin: 0, fontSize: ".72rem", color: "#94a3b8" }}>
          Acesso rápido direto da tela inicial, sem precisar abrir o navegador.
        </p>
      </div>
      <button onClick={onInstall} style={{
        background: "linear-gradient(135deg,#818cf8,#6366f1)", color: "#fff",
        border: "none", padding: ".55rem 1rem", borderRadius: ".75rem",
        fontWeight: 800, fontSize: ".8rem", whiteSpace: "nowrap", flexShrink: 0,
      }}>
        Instalar
      </button>
      <button onClick={() => setDismissed(true)} aria-label="Fechar"
        style={{ background: "transparent", border: "none", color: "#64748b", fontSize: "1.1rem", padding: ".25rem", flexShrink: 0 }}>

      </button>

      <div style={{background:"#1e293b",borderRadius:"2rem",padding:"3rem 2rem",width:"100%",maxWidth:420,textAlign:"center",border:"1px solid #334155",boxShadow:"0 25px 50px -12px rgba(0,0,0,.6)"}}>

          onMouseOver={e=>e.currentTarget.style.filter="brightness(1.15)"}

// ── LISTENING (ALUNO) ──────────────────────────────────────────────────────
function loadListeningLevel() { try { return localStorage.getItem("mph_listening_level") || null; } catch { return null; } }
function saveListeningLevel(l) { try { localStorage.setItem("mph_listening_level", l); } catch {} }

function ListeningLevelScreen({ onChoose }) {
  return (
    <div className="fade-in" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"1.5rem"}}>
      <div style={{background:"#1e293b",borderRadius:"2rem",padding:"3rem 2rem",width:"100%",maxWidth:420,textAlign:"center",border:"1px solid #334155",boxShadow:"0 25px 50px -12px rgba(0,0,0,.6)"}}>
        <span style={{fontSize:"4.5rem",display:"block",marginBottom:".5rem"}}>🎧</span>
        <h1 style={{fontSize:"1.6rem",fontWeight:900,color:"#f8fafc",margin:"0 0 .4rem"}}>Qual é o seu nível?</h1>
        <p style={{color:"#94a3b8",fontSize:".95rem",marginBottom:"2.25rem"}}>Assim mostramos os exercícios de listening certos pra você</p>
        {LISTENING_LEVELS.filter(l=>l!=="Todos os níveis").map(l => (
          <button key={l} onClick={()=>onChoose(l)}
            style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"1.1rem 1.5rem",borderRadius:"1rem",border:"1px solid #334155",background:"#0f172a",color:"#f8fafc",fontSize:"1.05rem",fontWeight:800,marginBottom:"1rem",transition:"all .2s"}}
            onMouseOver={e=>e.currentTarget.style.filter="brightness(1.15)"}
            onMouseOut={e=>e.currentTarget.style.filter="brightness(1)"}>
            {l}
          </button>
        ))}
        <p style={{marginTop:"1rem",fontSize:".75rem",color:"#475569"}}>Você pode trocar de nível depois, se quiser 🔄</p>
      </div>
    </div>

}

function ListeningListScreen({ level, onOpen, onBack, onChangeLevel }) {
  const [items, setItems]     = useState(null);
  const [progress, setProgress] = useState({});
  const [error, setError]     = useState(null);

  useEffect(() => {
    Promise.all([fetchListeningExercises(), fetchListeningProgressForCurrentUser()])
      .then(([ex, prog]) => { setItems(ex); setProgress(prog); })
      .catch(e => setError(e.message));
  }, []);

  const visible = (items || []).filter(ex => ex.level === level || ex.level === "Todos os níveis");

  return (
    <div className="fade-in" style={{maxWidth:600,margin:"0 auto",padding:"1.75rem 1.25rem 3rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:0,fontSize:"1.3rem",fontWeight:900,color:"#f8fafc"}}>🎧 Listening</h2>
          <p style={{margin:"4px 0 0",fontSize:".75rem",color:"#64748b"}}>Nível: {level}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onChangeLevel} style={{background:"#1e293b",border:"1px solid #334155",color:"#f8fafc",padding:".5rem 1rem",borderRadius:".75rem",fontWeight:700,fontSize:".78rem"}}>Trocar nível</button>
          <button onClick={onBack} style={{background:"#1e293b",border:"1px solid #334155",color:"#f8fafc",padding:".5rem 1rem",borderRadius:".75rem",fontWeight:700,fontSize:".78rem"}}>← Voltar</button>
        </div>
      </div>

      {error && <p style={{color:"#fb7185",fontSize:".8rem"}}>{error}</p>}
      {items === null ? <Spinner/> : visible.length === 0 ? (
        <p style={{color:"#475569",fontSize:".9rem",textAlign:"center",padding:"3rem 1rem"}}>Nenhum exercício de listening disponível pro seu nível ainda. Volte em breve! 🎧</p>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          {visible.map(ex => {
            const done = progress[ex.id];
            return (
              <button key={ex.id} onClick={()=>onOpen(ex)} className="word-card-hover"
                style={{textAlign:"left",background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.1rem 1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"1rem"}}>
                <div>
                  <p style={{margin:0,fontWeight:800,color:"#f8fafc",fontSize:".95rem"}}>{ex.title}</p>
                  <p style={{margin:"4px 0 0",fontSize:".72rem",color:"#94a3b8"}}>{(ex.questions||[]).length} pergunta(s)</p>
                </div>
                {done ? (
                  <span style={{background:"#052e1c",color:"#4ade80",padding:"4px 10px",borderRadius:"999px",fontSize:".7rem",fontWeight:700,whiteSpace:"nowrap"}}>✅ {done.score}/{(ex.questions||[]).length}</span>
                ) : (
                  <span style={{color:"#818cf8",fontSize:"1.2rem"}}>▶</span>
                )}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ListeningExerciseScreen({ exercise, onBack }) {
  const [answers, setAnswers]     = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [showTranscript, setShowTranscript] = useState(false);

  const questions = exercise.questions || [];

  function choose(qIdx, optIdx) {
    if (submitted) return;
    setAnswers(a => ({ ...a, [qIdx]: optIdx }));
  }

  async function handleSubmit() {
    const score = questions.reduce((acc,q,i) => acc + (answers[i]===q.correct ? 1 : 0), 0);
    setSubmitted(true);
    try {
      await saveListeningProgress(exercise.id, { score, total: questions.length, answers });
      await logActivity({ type:"listening", exerciseId: exercise.id, exerciseTitle: exercise.title, score, total: questions.length });
    } catch (e) { console.warn("Não foi possível salvar progresso de listening:", e); }
  }

  const allAnswered = questions.every((_,i) => answers[i] !== undefined);
  const score = questions.reduce((acc,q,i) => acc + (answers[i]===q.correct ? 1 : 0), 0);

  return (
    <div className="fade-in" style={{maxWidth:600,margin:"0 auto",padding:"1.75rem 1.25rem 3rem"}}>
      <button onClick={onBack} style={{background:"transparent",border:"none",color:"#818cf8",fontSize:".85rem",fontWeight:700,marginBottom:"1rem",padding:0}}>← Voltar pra lista</button>

      <h2 style={{margin:"0 0 .25rem",fontSize:"1.25rem",fontWeight:900,color:"#f8fafc"}}>{exercise.title}</h2>
      <p style={{margin:"0 0 1.25rem",fontSize:".75rem",color:"#64748b"}}>{exercise.level}</p>

      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.25rem",marginBottom:"1.5rem"}}>
        <audio controls src={exercise.audioUrl} style={{width:"100%"}} />
      </div>

      {questions.map((q, qi) => (
        <div key={qi} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"1.25rem",padding:"1.1rem 1.25rem",marginBottom:"1rem"}}>
          <p style={{margin:"0 0 .75rem",fontWeight:800,color:"#f8fafc",fontSize:".9rem"}}>{qi+1}. {q.text}</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.options.map((opt, oi) => {
              const isChosen = answers[qi] === oi;
              const isCorrectOpt = oi === q.correct;
              let bg = "#0f172a", border = "#334155", color = "#f8fafc";
              if (submitted) {
                if (isCorrectOpt) { bg="#052e1c"; border="#059669"; color="#4ade80"; }
                else if (isChosen) { bg="#450a0a"; border="#dc2626"; color="#fca5a5"; }
              } else if (isChosen) { bg="#312e81"; border="#818cf8"; }
              return (
                <button key={oi} disabled={submitted} onClick={()=>choose(qi,oi)}
                  style={{textAlign:"left",background:bg,border:`1.5px solid ${border}`,color,padding:".7rem .9rem",borderRadius:".75rem",fontSize:".85rem",fontWeight:600}}>
                  {opt}
                </button>
              );
            })}
          </div>
        </div>
      ))}

      {!submitted ? (
        <button onClick={handleSubmit} disabled={!allAnswered}
          style={{width:"100%",background: allAnswered ? "linear-gradient(135deg,#818cf8,#6366f1)" : "#334155",color:"#fff",border:"none",padding:"1rem",borderRadius:"1rem",fontWeight:800,fontSize:".95rem",opacity:allAnswered?1:.6}}>
          {allAnswered ? "Corrigir respostas" : `Responda todas as perguntas (${Object.keys(answers).length}/${questions.length})`}
        </button>
      ) : (
        <div className="fade-in" style={{textAlign:"center",marginTop:"1rem"}}>
          <div style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",display:"inline-block",padding:"1rem 2rem",borderRadius:"1.25rem",fontWeight:900,color:"#fff",fontSize:"1.3rem",marginBottom:"1.25rem"}}>
            {score}/{questions.length} corretas
          </div>
          <div>
            <button onClick={()=>setShowTranscript(s=>!s)} style={{background:"#1e293b",border:"1px solid #334155",color:"#f8fafc",padding:".65rem 1.25rem",borderRadius:".85rem",fontWeight:700,fontSize:".82rem"}}>
              {showTranscript ? "Esconder transcrição" : "📄 Ver transcrição"}
            </button>
          </div>
          {showTranscript && (
            <p className="fade-in" style={{textAlign:"left",background:"#1e293b",border:"1px solid #334155",borderRadius:"1rem",padding:"1.1rem 1.25rem",marginTop:"1rem",color:"#cbd5e1",fontSize:".85rem",lineHeight:1.7,whiteSpace:"pre-wrap"}}>
              {exercise.transcript}
            </p>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [user,      setUser]      = useState(undefined);
  const [score,     setScore]     = useState(0);
  const [animScore, setAnimScore] = useState(false);
  const [pairs,     setPairs]     = useState([]);
  const [idx,       setIdx]       = useState(0);
  const [view,      setView]      = useState("exercises");
  const [track,     setTrack]     = useState(undefined); // "en" | "no" | undefined (ainda não escolhida)
  const [sequenceMode, setSequenceMode] = useState(null); // { phonemeLabel, totalSteps } | null
  const [listeningLevel, setListeningLevel] = useState(undefined); // undefined = ainda não carregou, null = precisa escolher
  const [activeListeningExercise, setActiveListeningExercise] = useState(null);
  const { canInstall, promptInstall } = usePwaInstall();

  function getPairsForTrack(t) { return t === "no" ? PAIRS_NO : PAIRS_EN; }

  function handleChooseTrack(t) {
    saveTrack(t);
    setTrack(t);
    clearSession();
    const shuffled = shuffleArray(getPairsForTrack(t));
    setScore(0); setIdx(0); setPairs(shuffled);
    saveSession(0,0,shuffled.map(p=>p.id));
  }

  function handleChangeTrack() {
    localStorage.removeItem("mph_track");
    clearSession();
    setSequenceMode(null);
    setView("exercises");
    setTrack(null); // volta para a tela de seleção de trilha
  }

  useEffect(() => {
    let unsub = () => {};
    redirectResultPromise.finally(() => {
      unsub = auth.onAuthStateChanged(u => {
        setUser(u || null);
        if (u) {
          const savedTrack = loadTrack();
          setTrack(savedTrack || null); // null = precisa escolher
          setListeningLevel(loadListeningLevel() || null);
          if (!savedTrack) { setPairs([]); setIdx(0); setScore(0); return; }
          const activePairs = getPairsForTrack(savedTrack);
          const saved = loadSession();
          if (saved && saved.pairIds && saved.pairIds.length > 0) {
            const ordered = saved.pairIds.map(id=>activePairs.find(p=>p.id===id)).filter(Boolean);
            if (ordered.length > 0) { setPairs(ordered); setIdx(saved.idx||0); setScore(saved.score||0); return; }
          }
          const shuffled = shuffleArray(activePairs);
          setPairs(shuffled); setIdx(0); setScore(0);
          saveSession(0,0,shuffled.map(p=>p.id));
        } else {
          setPairs([]); setIdx(0); setScore(0); setTrack(undefined);
        }
      });
    });
    return () => unsub();
  }, []);

  function advanceIdx(currentPairs, currentIdx) {
    const next = currentIdx + 1;
    setIdx(next);
    if (!sequenceMode) saveSession(next, score, currentPairs.map(p=>p.id));
  }

  function addScore(pts, currentPairs, currentIdx, currentScore) {
    const next = currentScore + pts;
    setScore(next);
    setAnimScore(true); setTimeout(()=>setAnimScore(false),300);
    if (!sequenceMode) saveSession(currentIdx, next, currentPairs.map(p=>p.id));
  }

  function handleRestart() {
    clearSession();
    setSequenceMode(null);
    const shuffled = shuffleArray(getPairsForTrack(track));
    setScore(0); setIdx(0); setPairs(shuffled);
    saveSession(0,0,shuffled.map(p=>p.id));
  }

  function handlePracticeFromHub(phoneme) {
    const activePairs = getPairsForTrack(track);
    const sequenceIds = Array.isArray(phoneme.exercicios_sequencia) ? phoneme.exercicios_sequencia : null;

    if (sequenceIds && sequenceIds.length > 0) {
      const sequencePairs = sequenceIds.map(id => activePairs.find(p => String(p.id) === String(id))).filter(Boolean);
      if (sequencePairs.length > 0) {
        setSequenceMode({ phonemeLabel: phoneme.simbolo, totalSteps: sequencePairs.length });
        setPairs(sequencePairs);
        setIdx(0);
        clearSession();
        setView("exercises");
        return;
      }
      console.warn(`Nenhum exercício encontrado para exercicios_sequencia=${JSON.stringify(sequenceIds)}`);
    }

    // Fallback: comportamento antigo, link único (compatibilidade com fonemas sem sequência)
    const link = phoneme.id_exercicio_link;
    const match = activePairs.find(p => String(p.id) === String(link));
    if (match) {
      setSequenceMode(null);
      const currentPairs = pairs.length > 0 ? pairs : activePairs;
      const foundIdx = currentPairs.findIndex(p => p.id === match.id);
      if (foundIdx !== -1) {
        setPairs(currentPairs);
        setIdx(foundIdx);
        saveSession(foundIdx, score, currentPairs.map(p=>p.id));
      }
    } else {
      console.warn(`Nenhum exercício encontrado para id_exercicio_link="${link}"`);
    }

    setView("exercises");
  }

  function handleFinishSequence() {
    setSequenceMode(null);
    setView("hub");
  }

  function handleChooseListeningLevel(l) {
    saveListeningLevel(l);
    setListeningLevel(l);
  }

  function handleChangeListeningLevel() {
    localStorage.removeItem("mph_listening_level");
    setListeningLevel(null);
    setActiveListeningExercise(null);
  }

  if (user === undefined) return <Spinner/>;
  if (user === null)      return <LoginScreen/>;
  if (user.email === ADMIN_EMAIL) return <AdminDashboard user={user}/>;
  if (track === undefined) return <Spinner/>;
  if (track === null) return <TrackSelectScreen onChoose={handleChooseTrack}/>;

  let mainContent;

  if (view === "listening") {
    if (listeningLevel === null) {
      mainContent = <ListeningLevelScreen onChoose={handleChooseListeningLevel} />;
    } else if (activeListeningExercise) {
      mainContent = (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <Header user={user} score={score} animScore={animScore} onOpenListening={()=>setActiveListeningExercise(null)} onChangeTrack={handleChangeTrack}/>
          <main style={{flex:1}}>
            <ListeningExerciseScreen exercise={activeListeningExercise} onBack={()=>setActiveListeningExercise(null)} />
          </main>
        </div>
      );
    } else {
      mainContent = (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <Header user={user} score={score} animScore={animScore} onOpenListening={()=>setView("exercises")} onChangeTrack={handleChangeTrack}/>
          <main style={{flex:1}}>
            <ListeningListScreen
              level={listeningLevel}
              onOpen={setActiveListeningExercise}
              onBack={()=>setView("exercises")}
              onChangeLevel={handleChangeListeningLevel}
            />
          </main>
        </div>
      );
    }
  } else if (view === "hub") {
    mainContent = (
      <PhonemeHubScreen
        onPractice={handlePracticeFromHub}
        onBack={() => setView("exercises")}
        track={track}
      />
    );
  } else if (pairs.length === 0) {
    mainContent = <Spinner/>;
  } else if (idx >= pairs.length) {
    if (sequenceMode) {
      mainContent = (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <Header user={user} score={score} animScore={animScore} onOpenHub={()=>setView("hub")} onOpenListening={()=>setView("listening")} onChangeTrack={handleChangeTrack}/>
          <main style={{maxWidth:600,width:"100%",margin:"0 auto",padding:"1.75rem 1.25rem 3rem",flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div className="fade-in" style={{textAlign:"center",background:"#1e293b",border:"1px solid #334155",borderRadius:"1.5rem",padding:"2.5rem 1.75rem",maxWidth:420}}>
              <span style={{fontSize:"3rem",display:"block",marginBottom:".75rem"}}>🏅</span>
              <h2 style={{color:"#f8fafc",fontSize:"1.4rem",fontWeight:900,margin:"0 0 .5rem"}}>Trilha {sequenceMode.phonemeLabel} completa!</h2>
              <p style={{color:"#94a3b8",fontSize:".9rem",marginBottom:"1.75rem"}}>Você concluiu as {sequenceMode.totalSteps} etapas deste fonema.</p>
              <button onClick={handleFinishSequence}
                style={{width:"100%",background:"linear-gradient(135deg,#818cf8,#818cf8cc)",color:"#fff",border:"none",padding:"1rem",borderRadius:"1rem",fontSize:".95rem",fontWeight:800}}>
                Voltar ao Hub de Fonemas ➔
              </button>
            </div>
          </main>
        </div>
      );
    } else {
      mainContent = (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
          <Header user={user} score={score} animScore={animScore} onOpenHub={()=>setView("hub")} onOpenListening={()=>setView("listening")} onChangeTrack={handleChangeTrack}/>
          <SummaryScreen score={score} total={pairs.length} onRestart={handleRestart}/>
        </div>
      );
    }
  } else {
    mainContent = (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <Header user={user} score={score} animScore={animScore} onOpenHub={()=>setView("hub")} onOpenListening={()=>setView("listening")} onChangeTrack={handleChangeTrack}/>
        <main style={{maxWidth:600,width:"100%",margin:"0 auto",padding:"1.75rem 1.25rem 3rem",flex:1}}>
          <ExerciseView
            pair={pairs[idx]}
            user={user}
            track={track}
            onCorrectAnswer={(pts)=>addScore(pts,pairs,idx,score)}
            onNext={()=>advanceIdx(pairs,idx)}
            isLast={idx===pairs.length-1}
            progressText={sequenceMode ? `Etapa ${idx+1}/${sequenceMode.totalSteps}` : `${idx+1} / ${pairs.length}`}
            nextLabel={sequenceMode && idx < pairs.length-1 ? `Avançar para Etapa ${idx+2}/${sequenceMode.totalSteps} ➔` : null}
          />
        </main>
      </div>
    );
  }

  return (
    <>
      {mainContent}
      <InstallBanner canInstall={canInstall} onInstall={promptInstall} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((err) => {

    });
  });
